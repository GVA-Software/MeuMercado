name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# npm (NÃO pnpm): é o mesmo gerenciador do dev local e do deploy no Render. Os deps
# do workspace usam "*" (npm-workspaces), que o pnpm 9 não linka → install quebrava.
jobs:
  build-test:
    name: Build · Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install --no-audit --no-fund

      # domain/contracts primeiro (geram os dist que api/mobile tipam), depois o resto.
      - name: Build
        run: npm run build:packages && npm run build

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit + integração)
        run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install --no-audit --no-fund

      # O dev server do mobile importa os dist de domain/contracts.
      - name: Build packages
        run: npm run build:packages

      # Chromium + WebKit: a jornada roda nos dois motores. WebKit = engine do
      # Safari/iOS, para pegar bugs que só aparecem no iPhone.
      - name: Install Playwright browsers
        working-directory: apps/mobile
        run: npx playwright install --with-deps chromium webkit

      - name: E2E (jornada crítica)
        run: npm run e2e -w @meumercado/mobile

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/mobile/playwright-report
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Informativo — nunca bloqueia (vulns transitivas nem sempre acionáveis).
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm audit --audit-level high || true
