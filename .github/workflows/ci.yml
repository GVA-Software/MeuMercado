name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # NOTA: quando um pnpm-lock.yaml for commitado, trocar para
      # `--frozen-lockfile` e ativar `cache: pnpm` no setup-node acima.
      - name: Install
        run: pnpm install --no-frozen-lockfile

      # Build primeiro: gera os dist de domain/contracts que api/mobile tipam.
      - name: Build
        run: pnpm -r build

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test (unit + integração)
        run: pnpm -r run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --no-frozen-lockfile

      # domain/contracts geram os dist que o dev server do mobile importa.
      - name: Build
        run: pnpm -r build

      - name: Install Playwright browser
        run: pnpm --filter @meumercado/mobile exec playwright install --with-deps chromium

      - name: E2E (jornada crítica)
        run: pnpm --filter @meumercado/mobile run e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/mobile/playwright-report
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Informativo — não bloqueia o merge (vulns transitivas nem sempre acionáveis).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm audit --audit-level high
