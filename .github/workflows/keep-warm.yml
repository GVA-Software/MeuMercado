name: keep-warm

# Mantém o servidor free do Render "acordado" (evita o cold start ~30-50s) e roda a
# varredura de expiração de planos. A cada 5 min (o Render dorme após ~15 min ocioso
# e o cron do GitHub costuma ATRASAR — 5 min dá margem). Cobre ~06h-23h BRT (09-01
# UTC) pra não gastar as 750h/mês do free. NOTA: keep-warm NÃO elimina o cold start
# (o atraso do GitHub ainda abre brechas); só o plano pago do Render (ou um pinger
# externo tipo UptimeRobot) garante zero cold start.
on:
  schedule:
    - cron: '*/5 9-23 * * *'
    - cron: '*/5 0-1 * * *'
  workflow_dispatch: {}

# Segredo do cron: por padrão usa o valor embutido (funciona sem configurar). Para
# endurecer, defina o secret CRON_SECRET no repo e a env CRON_SECRET no Render.
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Acorda a API + o BANCO (keep-warm)
        # /api/health/db faz SELECT 1 → acorda o web service (Render) E o Neon (que
        # dorme sozinho quando ocioso). Sem tocar o banco aqui, a 1ª query do usuário
        # pagava ~45s de cold start do Postgres.
        run: curl -fsS --max-time 90 https://meumercado-prod.onrender.com/api/health/db > /dev/null || true

      - name: Varre expirações de plano
        run: |
          curl -fsS --max-time 90 -X POST https://meumercado-prod.onrender.com/api/cron/expiracoes \
            -H "x-cron-secret: ${CRON_SECRET}" > /dev/null || true
        env:
          # Sem fallback: o secret CRON_SECRET DEVE estar definido no repositório
          # (Settings → Secrets → Actions). Sem ele, o /cron responde 401 (e o `|| true`
          # acima evita quebrar o job) — nunca cai num segredo público.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
