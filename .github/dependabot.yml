version: 2
updates:
  # Dependências npm/pnpm de todo o monorepo.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Agrupa atualizações de patch/minor para reduzir ruído de PRs.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Próprias GitHub Actions usadas nos workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
