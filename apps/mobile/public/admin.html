<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Meu Mercado — Administração</title>
    <style>
      :root {
        --bg: #0e1117;
        --surface: #171b24;
        --card: #1f2430;
        --border: #2a2f3c;
        --text: #eef1f6;
        --muted: #8a93a3;
        --sub: #c2c8d2;
        --primary: #ff6b2b;
        --green: #22c55e;
        --nina: #38bdf8;
        --danger: #ef4444;
        --purple: #a78bfa;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
      }
      button { font-family: inherit; }
      .wrap { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

      /* Login */
      .login { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
      .login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
      .brand img { width: 34px; height: 34px; object-fit: contain; }
      .brand b { color: var(--primary); font-size: 18px; }
      h1 { font-size: 20px; margin: 14px 0 4px; }
      .hint { color: var(--muted); font-size: 13px; margin: 0 0 18px; }
      label { display: block; color: var(--sub); font-size: 12px; font-weight: 700; margin: 12px 0 5px; }
      input {
        width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px;
        background: var(--card); color: var(--text); font-size: 15px; outline: none;
      }
      input:focus { border-color: var(--primary); }
      .pw-wrap { position: relative; }
      .pw-wrap input { padding-right: 46px; }
      .pw-eye { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 17px; padding: 6px; line-height: 1; }
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        border: none; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700;
        cursor: pointer; background: var(--primary); color: #fff; width: 100%;
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-ghost { background: transparent; color: var(--sub); border: 1.5px solid var(--border); }
      .err { color: var(--danger); font-size: 13px; margin: 12px 0 0; min-height: 16px; font-weight: 600; }

      /* Header */
      .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 12px; }
      .top .brand b { font-size: 20px; }
      .top-sub { color: var(--muted); font-size: 12px; }
      .logout { background: transparent; border: 1px solid var(--border); color: var(--sub); border-radius: 99px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }

      /* Abas */
      .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
      .tab { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--sub); border-radius: 12px; padding: 10px 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
      .tab.on { background: var(--primary); color: #fff; border-color: var(--primary); }
      .tab-badge { display: inline-block; background: var(--danger); color: #fff; border-radius: 99px; font-size: 11px; font-weight: 800; padding: 1px 7px; margin-left: 4px; }
      .bell { position: relative; background: transparent; border: 1px solid var(--border); border-radius: 12px; width: 40px; height: 38px; font-size: 18px; cursor: pointer; margin-right: 8px; }
      .bell-badge { position: absolute; top: -6px; right: -6px; background: var(--danger); color: #fff; border-radius: 99px; font-size: 10px; font-weight: 800; padding: 1px 6px; }
      .top { display: flex; align-items: center; }
      .top > div:first-child { flex: 1; }

      /* Feedbacks */
      .fb { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
      .fb-open { border-left: 3px solid var(--primary); }
      .fb-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
      .fb-tipo { font-size: 12px; font-weight: 800; color: var(--text); }
      .fb-user { font-size: 11px; color: var(--muted); }
      .fb-msg { font-size: 14px; color: var(--sub); margin: 0 0 12px; line-height: 1.5; white-space: pre-wrap; }
      .fb-reply { display: flex; flex-direction: column; gap: 8px; }
      .fb-reply textarea { width: 100%; box-sizing: border-box; min-height: 64px; border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: var(--card); color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; }
      .fb-resp { align-self: flex-end; background: var(--primary); color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
      .fb-answered { background: var(--card); border-radius: 10px; padding: 10px 12px; font-size: 13px; color: var(--sub); line-height: 1.5; }

      /* Stats */
      .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
      @media (min-width: 640px) { .stats { grid-template-columns: repeat(4, 1fr); } }
      .stat { border-radius: 16px; padding: 16px 18px; }
      .stat .n { font-size: 30px; font-weight: 800; line-height: 1; margin: 0; }
      .stat .l { color: var(--sub); font-size: 12px; font-weight: 700; margin: 8px 0 0; }
      .mini { display: flex; justify-content: space-around; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px; margin-bottom: 20px; }
      .mini div { text-align: center; }
      .mini .n { font-size: 18px; font-weight: 800; margin: 0; }
      .mini .l { color: var(--muted); font-size: 11px; margin: 3px 0 0; }

      /* Funil */
      .funnel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 20px; }
      .ftitle { font-size: 13px; font-weight: 800; color: var(--sub); margin: 0 0 14px; }
      .fstep { margin-bottom: 12px; }
      .fmeta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; font-size: 13px; }
      .fmeta span { color: var(--sub); }
      .fmeta b { font-size: 15px; }
      .fmeta i { color: var(--muted); font-size: 12px; font-weight: 600; font-style: normal; }
      .ftrack { height: 8px; border-radius: 99px; background: var(--border); overflow: hidden; }
      .ffill { height: 100%; border-radius: 99px; }
      .fnote { color: var(--muted); font-size: 12px; margin: 12px 0 0; line-height: 1.5; }
      .fnote b { color: var(--sub); }
      .qa-run { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 12px; padding: 11px 14px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
      .qa-run:disabled { opacity: 0.6; cursor: default; }
      .qa-sum { font-size: 13px; color: var(--sub); margin: 0 0 10px; line-height: 1.5; }
      .qa-lentes { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
      .qa-lente { font-size: 12px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px; }
      .qa-list { margin: 0; padding-left: 18px; color: var(--sub); font-size: 12px; line-height: 1.6; max-height: 320px; overflow-y: auto; }
      .dup-grp { border: 1px solid var(--border); border-radius: 12px; padding: 8px; margin-bottom: 10px; background: var(--card); }
      .dup-row { display: flex; align-items: center; gap: 8px; padding: 6px 4px; }
      .dup-row + .dup-row { border-top: 1px dashed var(--border); }
      .dup-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .dup-info b { font-size: 13px; color: var(--sub); }
      .dup-info span { font-size: 11px; color: var(--muted); }
      .dup-keep { flex-shrink: 0; background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }

      .search { margin-bottom: 14px; }

      /* Users */
      .user { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
      .user-head { display: flex; align-items: center; gap: 12px; width: 100%; background: none; border: none; padding: 13px 14px; cursor: pointer; text-align: left; color: inherit; }
      .avatar { width: 42px; height: 42px; border-radius: 12px; background: rgba(255,107,43,0.16); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; flex-shrink: 0; }
      .user-info { flex: 1; min-width: 0; }
      .user-name { font-size: 14px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 6px; }
      .user-email { color: var(--muted); font-size: 12px; margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
      .chip { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
      .date { color: var(--muted); font-size: 10px; }
      .tag-admin { background: rgba(255,107,43,0.16); color: var(--primary); font-size: 9px; font-weight: 800; padding: 1px 6px; border-radius: 99px; }
      .actions { border-top: 1px solid var(--border); padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
      .act { border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: rgba(255,107,43,0.12); color: var(--primary); border: 1px solid rgba(255,107,43,0.35); }
      .act.danger { background: rgba(239,68,68,0.12); color: var(--danger); border-color: rgba(239,68,68,0.35); }
      .act:disabled { opacity: 0.5; cursor: not-allowed; }
      .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
      .loading { text-align: center; color: var(--muted); padding: 50px 20px; }
      .loading img { width: 84px; height: 84px; animation: bob 1s ease-in-out infinite; }
      @keyframes bob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
      .banner { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4); color: var(--danger); border-radius: 12px; padding: 10px 12px; margin-bottom: 14px; font-size: 13px; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/admin.js" defer></script>
  </body>
</html>
