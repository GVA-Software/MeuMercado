<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Meu Mercado — Administração</title>
    <style>
      :root {
        --bg: #0e1117;
        --surface: #171b24;
        --card: #1f2430;
        --border: #2a2f3c;
        --text: #eef1f6;
        --muted: #8a93a3;
        --sub: #c2c8d2;
        --primary: #ff6b2b;
        --green: #22c55e;
        --nina: #38bdf8;
        --danger: #ef4444;
        --purple: #a78bfa;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
      }
      button { font-family: inherit; }
      .wrap { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

      /* Login */
      .login { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
      .login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
      .brand img { width: 34px; height: 34px; object-fit: contain; }
      .brand b { color: var(--primary); font-size: 18px; }
      h1 { font-size: 20px; margin: 14px 0 4px; }
      .hint { color: var(--muted); font-size: 13px; margin: 0 0 18px; }
      label { display: block; color: var(--sub); font-size: 12px; font-weight: 700; margin: 12px 0 5px; }
      input {
        width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px;
        background: var(--card); color: var(--text); font-size: 15px; outline: none;
      }
      input:focus { border-color: var(--primary); }
      .pw-wrap { position: relative; }
      .pw-wrap input { padding-right: 46px; }
      .pw-eye { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 17px; padding: 6px; line-height: 1; }
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        border: none; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700;
        cursor: pointer; background: var(--primary); color: #fff; width: 100%;
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-ghost { background: transparent; color: var(--sub); border: 1.5px solid var(--border); }
      .err { color: var(--danger); font-size: 13px; margin: 12px 0 0; min-height: 16px; font-weight: 600; }

      /* Header */
      .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 12px; }
      .top .brand b { font-size: 20px; }
      .top-sub { color: var(--muted); font-size: 12px; }
      .logout { background: transparent; border: 1px solid var(--border); color: var(--sub); border-radius: 99px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }

      /* Abas */
      .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
      .tab { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--sub); border-radius: 12px; padding: 10px 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
      .tab.on { background: var(--primary); color: #fff; border-color: var(--primary); }
      .tab-badge { display: inline-block; background: var(--danger); color: #fff; border-radius: 99px; font-size: 11px; font-weight: 800; padding: 1px 7px; margin-left: 4px; }
      .bell { position: relative; background: transparent; border: 1px solid var(--border); border-radius: 12px; width: 40px; height: 38px; font-size: 18px; cursor: pointer; margin-right: 8px; }
      .bell-badge { position: absolute; top: -6px; right: -6px; background: var(--danger); color: #fff; border-radius: 99px; font-size: 10px; font-weight: 800; padding: 1px 6px; }
      .top { display: flex; align-items: center; }
      .top > div:first-child { flex: 1; }

      /* Feedbacks */
      .fb { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
      .fb-open { border-left: 3px solid var(--primary); }
      .fb-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
      .fb-tipo { font-size: 12px; font-weight: 800; color: var(--text); }
      .fb-user { font-size: 11px; color: var(--muted); }
      .fb-msg { font-size: 14px; color: var(--sub); margin: 0 0 12px; line-height: 1.5; white-space: pre-wrap; }
      .fb-reply { display: flex; flex-direction: column; gap: 8px; }
      .fb-reply textarea { width: 100%; box-sizing: border-box; min-height: 64px; border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: var(--card); color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; }
      .fb-resp { align-self: flex-end; background: var(--primary); color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
      .fb-answered { background: var(--card); border-radius: 10px; padding: 10px 12px; font-size: 13px; color: var(--sub); line-height: 1.5; }
      .email-test { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
      .test-email { background: var(--primary); color: #fff; border: none; border-radius: 10px; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
      .test-email:disabled { opacity: 0.6; cursor: default; }
      .email-msg { font-size: 13px; margin: 10px 0 0; line-height: 1.5; }
      .email-msg.ok { color: var(--green); }
      .email-msg.err { color: var(--danger); }

      /* Cobertura */
      .cov-mini-btn { float: right; background: transparent; border: 1px solid var(--border); color: var(--sub); border-radius: 8px; font-size: 11px; font-weight: 700; padding: 3px 8px; cursor: pointer; }
      .cov-busca { width: 100%; box-sizing: border-box; margin: 4px 0 6px; background: var(--card); color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 14px; outline: none; }
      .cov-busca:focus { border-color: var(--primary); }
      .cov-filtros { display: flex; gap: 8px; flex-wrap: wrap; }
      .cov-filtros .cov-busca { flex: 1; min-width: 180px; }
      .cov-catfiltro { flex: 0 0 auto; min-width: 180px; cursor: pointer; }
      .cov-catbtn { background: rgba(167,139,250,.14); color: var(--purple); border: 1px solid rgba(167,139,250,.4); border-radius: 9px; font-size: 12px; font-weight: 800; padding: 6px 12px; cursor: pointer; }
      .cov-catbtn:disabled { opacity: .4; cursor: default; }
      .cov-auto { width: 100%; margin: 2px 0 8px; background: linear-gradient(90deg, rgba(167,139,250,.18), rgba(56,189,248,.18)); color: var(--text); border: 1px solid rgba(167,139,250,.45); border-radius: 10px; font-size: 13px; font-weight: 800; padding: 10px; cursor: pointer; }
      .cov-auto:hover { border-color: var(--purple); }
      .cov-top { list-style: none; margin: 0; padding: 0; }
      .cov-top li { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--border); }
      .cov-top li:last-child { border-bottom: none; }
      .cov-pos { width: 28px; text-align: center; font-weight: 800; color: var(--sub); font-size: 14px; }
      .cov-name { flex: 1; font-size: 14px; color: var(--text); overflow: hidden; text-overflow: ellipsis; }
      .cov-name i { color: var(--muted); font-style: normal; font-size: 12px; }
      .cov-top li b { color: var(--green); font-size: 15px; }
      .cov-table { margin-top: 4px; }
      .cov-h, .cov-r { display: grid; gap: 8px; align-items: center; padding: 8px 6px; }
      .cov-h-m, .cov-r-m { grid-template-columns: 22px 1fr 52px 58px; }
      .cov-h-p, .cov-r-p { grid-template-columns: 22px 1fr 52px 58px; }
      .cov-h { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
      .cov-r { font-size: 14px; color: var(--sub); border-bottom: 1px solid var(--border); }
      .cov-r:last-child { border-bottom: none; }
      .cov-h span:last-child, .cov-h span:nth-last-child(2), .cov-r span:last-child, .cov-r span:nth-last-child(2) { text-align: right; }
      .cov-cell { color: var(--text); min-width: 0; }
      .cov-cell i { color: var(--muted); font-style: normal; font-size: 11px; }
      .cov-end { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }
      .cov-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
      .cov-tag { background: rgba(56,189,248,.12); color: var(--nina); border: 1px solid rgba(56,189,248,.28); border-radius: 6px; font-size: 10px; font-weight: 700; padding: 1px 6px; }
      .cov-r.low { background: #f59e0b12; }
      .cov-r.low span:nth-last-child(2) { color: #f59e0b; font-weight: 800; }
      .cov-chk, .cov-mchk { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
      .cov-noend { color: #f59e0b !important; }
      .cov-join { background: rgba(56,189,248,.12); color: var(--nina); border: 1px solid rgba(56,189,248,.35); border-radius: 9px; font-size: 12px; font-weight: 800; padding: 6px 12px; cursor: pointer; }
      .cov-join:disabled { opacity: .4; cursor: default; }
      .cov-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 10px 4px 2px; }
      .cov-selall { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--sub); font-weight: 700; }
      .cov-selall input { width: 15px; height: 15px; accent-color: var(--primary); }
      .cov-del { background: rgba(239,68,68,.12); color: var(--danger); border: 1px solid rgba(239,68,68,.35); border-radius: 9px; font-size: 12px; font-weight: 800; padding: 6px 12px; cursor: pointer; }
      .cov-del:disabled { opacity: .4; cursor: default; }
      .cov-size { background: var(--card); color: var(--sub); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; padding: 5px 6px; margin-left: auto; }
      .cov-pag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
      .cov-pg { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 28px; height: 28px; font-size: 16px; line-height: 1; cursor: pointer; }
      .cov-pg:disabled { opacity: .35; cursor: default; }
      .cov-pgn { color: var(--sub); }

      /* Cobertura — dashboard (redesign) */
      .cov-hero { display: flex; align-items: center; gap: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 18px 20px; margin-bottom: 14px; flex-wrap: wrap; }
      .cov-hero .ring { flex-shrink: 0; }
      .hero-info { flex: 1; min-width: 200px; }
      .hero-t { font-size: 20px; font-weight: 800; margin: 0; color: var(--text); }
      .hero-sub { font-size: 14px; font-weight: 700; color: var(--green); margin: 2px 0 12px; }
      .cov-chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .cov-chip { font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 99px; border: 1px solid; }
      .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
      @media (min-width: 720px) { .kpis { grid-template-columns: repeat(4, 1fr); } }
      .kpi { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 15px 16px; }
      .kpi-ico { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
      .kpi-n { font-size: 26px; font-weight: 800; margin: 0; color: var(--text); line-height: 1; }
      .kpi-l { font-size: 12px; color: var(--muted); margin: 4px 0 0; font-weight: 700; }
      .kpi-s { font-size: 11px; color: var(--sub); margin: 2px 0 0; }
      .cov-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
      @media (min-width: 720px) { .cov-grid { grid-template-columns: 1fr 1fr; } .cov-grid > :first-child { grid-column: 1 / -1; } }
      .cov-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; min-width: 0; }
      .cov-card-t { font-size: 13px; font-weight: 800; color: var(--sub); margin: 0 0 12px; }
      .cov-ins { list-style: none; margin: 0; padding: 0; }
      .cov-ins li { font-size: 13px; color: var(--sub); padding: 7px 0 7px 22px; position: relative; line-height: 1.4; border-bottom: 1px solid var(--border); }
      .cov-ins li:last-child { border-bottom: none; }
      .cov-ins li::before { content: '›'; position: absolute; left: 6px; color: var(--primary); font-weight: 800; }
      .cov-ins b { color: var(--text); }
      .donut-wrap { display: flex; justify-content: center; margin: 4px 0 12px; }
      .linechart { display: block; }
      .legend { display: flex; flex-direction: column; gap: 7px; margin-top: 10px; }
      .leg { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
      .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
      .leg-l { flex: 1; color: var(--sub); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .leg-v { color: var(--text); font-weight: 700; }
      .leg-v i { color: var(--muted); font-weight: 600; font-style: normal; }

      /* Toast */
      /* z-index acima dos modais (mm-modal-ov = 10000) para o toast aparecer SEMPRE na frente. */
      .mm-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,.5); z-index: 100000; opacity: 1; transition: opacity .35s; }
      .mm-toast.out { opacity: 0; }

      /* Modal próprio (tema do painel) */
      .mm-modal-ov { position: fixed; inset: 0; background: rgba(4,6,10,.66); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10000; }
      .mm-modal { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 22px; box-shadow: 0 24px 60px rgba(0,0,0,.6); }
      .mm-modal h3 { margin: 0 0 8px; font-size: 18px; color: var(--text); }
      .mm-modal p { margin: 0 0 16px; font-size: 14px; color: var(--sub); line-height: 1.5; }
      .mm-select { width: 100%; box-sizing: border-box; margin-bottom: 16px; background: var(--card); color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; }
      .mm-modal-acts { display: flex; justify-content: flex-end; gap: 10px; }
      .mm-btn, .mm-btn-ghost { border-radius: 10px; padding: 9px 18px; font-size: 14px; font-weight: 700; cursor: pointer; }
      .mm-btn { background: var(--primary); color: #fff; border: none; }
      .mm-btn.mm-danger { background: var(--danger); }
      .mm-btn-ghost { background: transparent; color: var(--sub); border: 1.5px solid var(--border); }

      /* Editor de produto */
      .ed-open { background: transparent; border: none; cursor: pointer; font-size: 13px; padding: 0 2px; opacity: .8; }
      .ed-open:hover { opacity: 1; }
      .ed-modal { max-width: 460px; max-height: 86vh; overflow-y: auto; }
      .ed-modal label { display: block; color: var(--sub); font-size: 12px; font-weight: 700; margin: 10px 0 4px; }
      .ed-full { width: 100%; margin: 8px 0 4px; }
      .ed-sep { margin: 16px 0 8px; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; border-top: 1px solid var(--border); padding-top: 12px; }
      .ed-preco { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; }
      .ed-preco-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
      .ed-preco-top b { color: var(--text); font-size: 14px; }
      .ed-preco-top span { color: var(--muted); font-size: 12px; }
      .ed-preco-bot { display: flex; align-items: center; gap: 8px; }
      .ed-rs { color: var(--sub); font-size: 13px; font-weight: 700; }
      .ed-val { flex: 1; min-width: 0; background: var(--surface); color: var(--text); border: 1.5px solid var(--border); border-radius: 9px; padding: 8px 10px; font-size: 14px; }
      .ed-val:focus { border-color: var(--primary); outline: none; }
      .ed-mini { background: var(--primary); color: #fff; border: none; border-radius: 9px; font-size: 12px; font-weight: 700; padding: 8px 12px; cursor: pointer; white-space: nowrap; }
      .ed-mini.ed-danger { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.4); }
      .ed-split-link { display: block; width: 100%; margin-top: 8px; background: transparent; border: 1px dashed var(--border); color: var(--sub); border-radius: 9px; font-size: 12px; font-weight: 700; padding: 7px; cursor: pointer; }
      .ed-split-link:hover { border-color: var(--nina); color: var(--nina); }

      /* Stats */
      .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
      @media (min-width: 640px) { .stats { grid-template-columns: repeat(4, 1fr); } }
      .stat { border-radius: 16px; padding: 16px 18px; }
      .stat .n { font-size: 30px; font-weight: 800; line-height: 1; margin: 0; }
      .stat .l { color: var(--sub); font-size: 12px; font-weight: 700; margin: 8px 0 0; }
      .mini { display: flex; justify-content: space-around; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px; margin-bottom: 20px; }
      .mini div { text-align: center; }
      .mini .n { font-size: 18px; font-weight: 800; margin: 0; }
      .mini .l { color: var(--muted); font-size: 11px; margin: 3px 0 0; }

      /* Funil */
      .funnel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 20px; }
      .ftitle { font-size: 13px; font-weight: 800; color: var(--sub); margin: 0 0 14px; }
      .fstep { margin-bottom: 12px; }
      .fmeta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; font-size: 13px; }
      .fmeta span { color: var(--sub); }
      .fmeta b { font-size: 15px; }
      .fmeta i { color: var(--muted); font-size: 12px; font-weight: 600; font-style: normal; }
      .ftrack { height: 8px; border-radius: 99px; background: var(--border); overflow: hidden; }
      .ffill { height: 100%; border-radius: 99px; }
      .fnote { color: var(--muted); font-size: 12px; margin: 12px 0 0; line-height: 1.5; }
      .fnote b { color: var(--sub); }
      .qa-run { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 12px; padding: 11px 14px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
      .qa-run:disabled { opacity: 0.6; cursor: default; }
      .qa-sum { font-size: 13px; color: var(--sub); margin: 0 0 10px; line-height: 1.5; }
      .qa-lentes { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
      .qa-lente { font-size: 12px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px; }
      .qa-list { margin: 0; padding-left: 18px; color: var(--sub); font-size: 12px; line-height: 1.6; max-height: 320px; overflow-y: auto; }
      .dup-grp { border: 1px solid var(--border); border-radius: 12px; padding: 8px; margin-bottom: 10px; background: var(--card); }
      .dup-row { display: flex; align-items: center; gap: 8px; padding: 6px 4px; }
      .dup-row + .dup-row { border-top: 1px dashed var(--border); }
      .dup-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .dup-info b { font-size: 13px; color: var(--sub); }
      .dup-info span { font-size: 11px; color: var(--muted); }
      .dup-keep { flex-shrink: 0; background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }

      .search { margin-bottom: 14px; }

      /* Users */
      .user { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
      .user-head { display: flex; align-items: center; gap: 12px; width: 100%; background: none; border: none; padding: 13px 14px; cursor: pointer; text-align: left; color: inherit; }
      .avatar { width: 42px; height: 42px; border-radius: 12px; background: rgba(255,107,43,0.16); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; flex-shrink: 0; }
      .user-info { flex: 1; min-width: 0; }
      .user-name { font-size: 14px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 6px; }
      .user-email { color: var(--muted); font-size: 12px; margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
      .chip { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
      .date { color: var(--muted); font-size: 10px; }
      .tag-admin { background: rgba(255,107,43,0.16); color: var(--primary); font-size: 9px; font-weight: 800; padding: 1px 6px; border-radius: 99px; }
      .actions { border-top: 1px solid var(--border); padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
      .act { border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: rgba(255,107,43,0.12); color: var(--primary); border: 1px solid rgba(255,107,43,0.35); }

      .banner { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4); color: var(--danger); border-radius: 12px; padding: 10px 12px; margin-bottom: 14px; font-size: 13px; font-weight: 600; }
